name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Hourly rebuild: both the podcast RSS and the Daily Substack feed are
    # fetched at build time, so new content appears without a manual deploy.
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}
      - name: Mobile overflow check
        run: |
          npm i --no-save playwright
          npx playwright install --with-deps chromium
          npx astro preview --host 127.0.0.1 --port 4321 &
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:4321/ >/dev/null && break; sleep 1; done
          node scripts/mobile-overflow-check.mjs http://127.0.0.1:4321
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
